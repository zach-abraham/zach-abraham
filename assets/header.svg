<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes flow {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px #58a6ff); }
        50% { filter: drop-shadow(0 0 8px #58a6ff); }
      }
      .node { animation: pulse 3s ease-in-out infinite; fill: #58a6ff; }
      .node:nth-child(2n) { animation-delay: 0.5s; }
      .node:nth-child(3n) { animation-delay: 1s; }
      .node:nth-child(5n) { animation-delay: 1.5s; }
      .node:nth-child(7n) { animation-delay: 2s; }
      .edge { stroke: #58a6ff; stroke-dasharray: 10 10; animation: flow 2s linear infinite; }
      .edge2 { stroke: #58a6ff; stroke-dasharray: 5 15; animation: flow 3s linear infinite reverse; }
      .title { animation: fadeIn 2s ease-out; }
      .subtitle { animation: fadeIn 2.5s ease-out; }
      .hal-eye { animation: glow 4s ease-in-out infinite; }
      .bg { fill: #0d1117; }
      .title-text { fill: #c9d1d9; }
      .sub-text { fill: #8b949e; }
      .grid-line { stroke: #161b22; }
    </style>
  </defs>

  <rect class="bg" width="900" height="280" rx="0"/>

  <!-- Subtle grid -->
  <g opacity="0.3">
    <line class="grid-line" x1="0" y1="40" x2="900" y2="40" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="80" x2="900" y2="80" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="120" x2="900" y2="120" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="160" x2="900" y2="160" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="200" x2="900" y2="200" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="240" x2="900" y2="240" stroke-width="0.5"/>
    <line class="grid-line" x1="100" y1="0" x2="100" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="200" y1="0" x2="200" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="300" y1="0" x2="300" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="400" y1="0" x2="400" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="500" y1="0" x2="500" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="600" y1="0" x2="600" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="700" y1="0" x2="700" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="800" y1="0" x2="800" y2="280" stroke-width="0.5"/>
  </g>

  <!-- Neural network edges - left cluster -->
  <g opacity="0.4">
    <line class="edge" x1="80" y1="60" x2="200" y2="100" stroke-width="1"/>
    <line class="edge" x1="200" y1="100" x2="320" y2="80" stroke-width="1"/>
    <line class="edge2" x1="320" y1="80" x2="160" y2="180" stroke-width="1"/>
    <line class="edge" x1="160" y1="180" x2="280" y2="220" stroke-width="1"/>
    <line class="edge2" x1="80" y1="60" x2="160" y2="180" stroke-width="1"/>
    <line class="edge" x1="200" y1="100" x2="280" y2="220" stroke-width="1"/>
  </g>

  <!-- Neural network edges - right cluster -->
  <g opacity="0.4">
    <line class="edge" x1="580" y1="50" x2="700" y2="90" stroke-width="1"/>
    <line class="edge2" x1="700" y1="90" x2="820" y2="70" stroke-width="1"/>
    <line class="edge" x1="820" y1="70" x2="750" y2="180" stroke-width="1"/>
    <line class="edge2" x1="750" y1="180" x2="650" y2="220" stroke-width="1"/>
    <line class="edge" x1="580" y1="50" x2="650" y2="220" stroke-width="1"/>
    <line class="edge2" x1="700" y1="90" x2="750" y2="180" stroke-width="1"/>
    <line class="edge" x1="820" y1="70" x2="650" y2="220" stroke-width="1"/>
    <line class="edge2" x1="580" y1="50" x2="750" y2="180" stroke-width="1"/>
  </g>

  <!-- Neural network nodes - left -->
  <circle class="node" cx="80" cy="60" r="4" opacity="0.6"/>
  <circle class="node" cx="200" cy="100" r="3" opacity="0.8"/>
  <circle class="node" cx="320" cy="80" r="3.5" opacity="0.5"/>
  <circle class="node" cx="160" cy="180" r="4" opacity="0.7"/>
  <circle class="node" cx="280" cy="220" r="3" opacity="0.6"/>
  <circle class="node" cx="120" cy="130" r="2.5" opacity="0.4"/>
  <circle class="node" cx="240" cy="160" r="2" opacity="0.5"/>

  <!-- Neural network nodes - right -->
  <circle class="node" cx="580" cy="50" r="3.5" opacity="0.7"/>
  <circle class="node" cx="700" cy="90" r="4" opacity="0.6"/>
  <circle class="node" cx="820" cy="70" r="3" opacity="0.5"/>
  <circle class="node" cx="750" cy="180" r="3.5" opacity="0.8"/>
  <circle class="node" cx="650" cy="220" r="4" opacity="0.6"/>
  <circle class="node" cx="850" cy="150" r="2.5" opacity="0.4"/>
  <circle class="node" cx="620" cy="140" r="2" opacity="0.5"/>

  <!-- Ambient scattered nodes -->
  <circle class="node" cx="50" cy="240" r="2" opacity="0.3"/>
  <circle class="node" cx="350" cy="30" r="2" opacity="0.3"/>
  <circle class="node" cx="450" cy="250" r="2.5" opacity="0.3"/>
  <circle class="node" cx="550" cy="260" r="2" opacity="0.3"/>
  <circle class="node" cx="870" cy="240" r="2" opacity="0.3"/>
  <circle class="node" cx="400" cy="60" r="1.5" opacity="0.2"/>
  <circle class="node" cx="500" cy="40" r="1.5" opacity="0.2"/>

  <!-- HAL eye accent (center) -->
  <circle class="hal-eye" cx="450" cy="105" r="8" fill="none" stroke="#f78166" stroke-width="2" opacity="0.6"/>
  <circle cx="450" cy="105" r="3" fill="#f78166" opacity="0.8"/>

  <!-- Title -->
  <text class="title title-text" x="450" y="140" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" letter-spacing="1">Zach Abraham</text>

  <!-- Subtitle -->
  <text class="subtitle sub-text" x="450" y="170" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" letter-spacing="2">AI INFRASTRUCTURE · MULTI-AGENT SYSTEMS · AUTOMATION</text>

  <!-- Accent line -->
  <line class="edge" x1="250" y1="195" x2="650" y2="195" stroke-width="1" opacity="0.3"/>

  <!-- Status indicators -->
  <g class="subtitle" opacity="0.5">
    <circle cx="340" cy="220" r="3" fill="#39d353"/>
    <text class="sub-text" x="350" y="224" font-family="'JetBrains Mono', monospace" font-size="11">8 agents live</text>
    <circle cx="470" cy="220" r="3" fill="#58a6ff"/>
    <text class="sub-text" x="480" y="224" font-family="'JetBrains Mono', monospace" font-size="11">5-machine mesh</text>
  </g>
</svg>
